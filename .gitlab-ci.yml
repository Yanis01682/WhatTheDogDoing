stages:
  - test
  - scan      # 新增：专门用来放代码扫描的阶段，排在 test 后面
  - build

# 1. 后端测试任务
backend-test:
  stage: test
  image: python:3.12
  script:
    - cd backend
    - pip install -r requirements.txt
    - pip install pytest httpx pytest-cov
    - pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing
  artifacts:
    paths:
      - backend/coverage.xml
  only:
    - main
    - merge_requests

# 2. SonarQube 代码扫描任务
sonarqube-check:
  stage: scan
  needs: ["backend-test"]
  image: sonarsource/sonar-scanner-cli:4.6
  script:
    - cd backend
    # 下面这行是缝合了学校秘钥和覆盖率报告的终极版
    - sonar-scanner -Dsonar.projectKey=WhatTheDogDoing:WhatTheDogDoing -Dsonar.sources=app -Dsonar.host.url=https://sonarqube.spring26b.secoder.net -Dsonar.login=00bfcdd4ec718487c16a7959940c0976b1f57d8a -Dsonar.python.coverage.reportPaths=coverage.xml
  allow_failure: true
  only:
    - main
    - merge_requests

# 3. 前端代码规范检查
frontend-lint:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm install
    - npm run lint
  only:
    - main
    - merge_requests

# 4. 前端构建任务
build-frontend:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
  only:
    - main
# === 数据库自动部署 ===
deploy-database:
  stage: deploy
  image: registry.secoder.net/tool/deployer
  script:
    - cd database
    # 告诉 Deployer 将数据库打包
    - export BUILD_IMAGE_NAME=$CI_REGISTRY_IMAGE/database
    - export BUILD_IMAGE_TAG=$CI_COMMIT_REF_SLUG
    - export BUILD_IMAGE_USERNAME=$CI_REGISTRY_USER
    - export BUILD_IMAGE_PASSWORD=$CI_REGISTRY_PASSWORD
    # 构建包含密码的自定义 MySQL 镜像
    - deployer build .
    # 替换线上容器，自动将容器命名为 mysql-db
    - deployer dyno replace mysql-db "$BUILD_IMAGE_NAME:$BUILD_IMAGE_TAG" "$REGISTRY_USER" "$REGISTRY_PWD"
  only:
    - main
# === 前端自动部署 ===
deploy-frontend:
  stage: deploy
  image: registry.secoder.net/tool/deployer
  script:
    - cd frontend
    # 1. 告诉 Deployer 将前端打包成叫什么名字的镜像
    - export BUILD_IMAGE_NAME=$CI_REGISTRY_IMAGE/frontend
    - export BUILD_IMAGE_TAG=$CI_COMMIT_REF_SLUG
    - export BUILD_IMAGE_USERNAME=$CI_REGISTRY_USER
    - export BUILD_IMAGE_PASSWORD=$CI_REGISTRY_PASSWORD
    # 2. 根据 frontend 里的 Dockerfile 真正开始构建镜像
    - deployer build .
    # 3. 将打好的镜像替换到线上容器中运行，容器命名为 frontend-dyno
    - deployer dyno replace frontend-dyno "$BUILD_IMAGE_NAME:$BUILD_IMAGE_TAG" "$REGISTRY_USER" "$REGISTRY_PWD"
  only:
    - main

# === 后端自动部署 ===
deploy-backend:
  stage: deploy
  image: registry.secoder.net/tool/deployer
  script:
    - cd backend
    # 1. 告诉 Deployer 将后端打包成叫什么名字的镜像
    - export BUILD_IMAGE_NAME=$CI_REGISTRY_IMAGE/backend
    - export BUILD_IMAGE_TAG=$CI_COMMIT_REF_SLUG
    - export BUILD_IMAGE_USERNAME=$CI_REGISTRY_USER
    - export BUILD_IMAGE_PASSWORD=$CI_REGISTRY_PASSWORD
    # 2. 根据 backend 里的 Dockerfile 真正开始构建镜像
    - deployer build .
    # 3. 将打好的镜像替换到线上容器中运行，容器命名为 backend-dyno
    - deployer dyno replace backend-dyno "$BUILD_IMAGE_NAME:$BUILD_IMAGE_TAG" "$REGISTRY_USER" "$REGISTRY_PWD"
  only:
    - main