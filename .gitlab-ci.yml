stages:
  - test
  - build

# 后端测试任务
backend-test:
  stage: test
  image: python:3.12
  script:
    - cd backend
    - pip install -r requirements.txt
    - pip install pytest httpx pytest-cov  # 重点：加了 pytest-cov 用来算覆盖率
    - pytest --cov=app --cov-report=term-missing  # 重点：指定测 app 文件夹并输出覆盖率报告
  only:
    - main
    - merge_requests

# 前端代码规范检查
frontend-lint:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm install
    - npm run lint             # 执行 package.json 里的 lint 脚本
  only:
    - main
    - merge_requests

# 构建任务（确保代码能打包成功）
build-frontend:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm install
    - npm run build            # 执行打包命令
  artifacts:
    paths:
      - frontend/dist/         # 保存打包后的文件
  only:
    - main