stages:
  - test
  - build

# 1. 后端测试任务（已配置生成 SonarQube 需要的 XML 报告）
backend-test:
  stage: test
  image: python:3.12
  script:
    - cd backend
    - pip install -r requirements.txt
    - pip install pytest httpx pytest-cov
    - pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing
  artifacts:
    paths:
      - backend/coverage.xml
  only:
    - main
    - merge_requests

# 2. SonarQube 代码扫描任务
sonarqube-check:
  stage: test
  needs: ["backend-test"]
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - cd backend
    - sonar-scanner -Dsonar.projectKey=$CI_PROJECT_NAME -Dsonar.sources=app -Dsonar.python.coverage.reportPaths=coverage.xml
  allow_failure: true
  only:
    - main
    - merge_requests

# 3. 前端代码规范检查 (原封不动)
frontend-lint:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm install
    - npm run lint
  only:
    - main
    - merge_requests

# 4. 前端构建任务 (原封不动)
build-frontend:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
  only:
    - main