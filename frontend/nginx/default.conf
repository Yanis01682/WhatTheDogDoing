server {
    listen 80;
    root /opt/app/dist;
    set $backend_upstream https://backend-dyno-whatthedogdoing.app.spring26b.secoder.net;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    location / {
        # 配合 React/Vue 的单页面应用路由回退机制
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # 保留完整路径转发到后端，避免 /api 前缀被吞掉。
    location /api/ {
        proxy_ssl_server_name on;
        proxy_set_header Host backend-dyno-whatthedogdoing.app.spring26b.secoder.net;
        proxy_pass $backend_upstream;
    }

    location /auth/ {
        proxy_ssl_server_name on;
        proxy_set_header Host backend-dyno-whatthedogdoing.app.spring26b.secoder.net;
        proxy_pass $backend_upstream;
    }

    location /health {
        proxy_ssl_server_name on;
        proxy_set_header Host backend-dyno-whatthedogdoing.app.spring26b.secoder.net;
        proxy_pass $backend_upstream;
    }
}
