server {
    listen 80;
    root /opt/app/dist;
    
    location / {
        # 配合 React/Vue 的单页面应用路由回退机制
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    # 如果你们前端 API 请求带有 /api/ 前缀，可以在这里配置反向代理到后端服务
    # 假设后端在 SECoder 上部署的内部服务名为 backend
    location /api/ {
        proxy_pass http://backend:8000/; 
    }
}